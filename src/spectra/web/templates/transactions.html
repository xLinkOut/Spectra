{% extends "base.html" %}
{% block title %}Transactions — Spectra{% endblock %}

{% block content %}
<h1 class="page-title">Transactions</h1>
<p class="page-subtitle" id="txSubtitle">Click a category or merchant to edit it</p>

<div class="table-container">
    <div class="table-toolbar">
        <input type="text" id="searchInput" placeholder="Search merchants..." style="flex:1; max-width: 260px;">
        <select id="categoryFilter">
            <option value="">All categories</option>
        </select>
        <input type="date" id="dateFrom" title="From date">
        <input type="date" id="dateTo" title="To date">
        <button class="btn btn-secondary btn-sm" id="uncatToggleBtn" type="button" onclick="toggleUncategorizedQueue()">Inbox zero: OFF</button>
    </div>

    <div class="uncategorized-queue" id="uncatQueue" style="display:none;">
        <div class="uncat-queue-info" id="uncatQueueInfo">Uncategorized queue</div>
        <div class="uncat-queue-actions">
            <button class="btn btn-secondary btn-sm" type="button" id="selectAllVisibleBtn" onclick="toggleSelectAllVisible()">Select all visible</button>
            <select id="bulkCategorySelect" class="settings-select">
                <option value="">Choose category…</option>
            </select>
            <button class="btn btn-primary btn-sm" type="button" onclick="applyBulkCategory()">Apply to selected</button>
        </div>
    </div>

    <div id="tableBody">
        <div class="empty-state">
            <div class="icon">📋</div>
            <h3>Loading...</h3>
        </div>
    </div>

    <div class="pagination" id="pagination"></div>
</div>
{% endblock %}

{% block scripts %}
<script>
    let currentPage = 1;
    let categories = [];
    let uncategorizedOnly = false;

    function themeVar(name, fallback = '') {
        return window.SpectraTheme?.getCssVar(name, fallback) || fallback;
    }

    function categoryOptionsHtml(selected = '') {
        return categories.map(cat => {
            const isSelected = cat === selected ? 'selected' : '';
            return `<option value="${cat}" ${isSelected}>${cat}</option>`;
        }).join('');
    }

    async function loadCategories() {
        const res = await fetch('/api/categories');
        const data = await res.json();
        categories = data.categories;

        const select = document.getElementById('categoryFilter');
        categories.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c;
            opt.textContent = c;
            select.appendChild(opt);
        });

        const bulkSelect = document.getElementById('bulkCategorySelect');
        bulkSelect.innerHTML = '<option value="">Choose category…</option>' + categoryOptionsHtml();
    }

    async function loadTransactions(page = 1) {
        await loadCurrency();
        currentPage = page;
        const search = document.getElementById('searchInput').value;
        const category = document.getElementById('categoryFilter').value;
        const dateFrom = document.getElementById('dateFrom').value;
        const dateTo = document.getElementById('dateTo').value;

        const params = new URLSearchParams({ page, per_page: 50 });
        if (search) params.set('search', search);
        if (category && !uncategorizedOnly) params.set('category', category);
        if (dateFrom) params.set('date_from', dateFrom);
        if (dateTo) params.set('date_to', dateTo);
        if (uncategorizedOnly) params.set('uncategorized_only', 'true');

        const res = await fetch(`/api/transactions?${params}`);
        const data = await res.json();

        renderTable(data.transactions);
        renderPagination(data.page, data.pages);

        const subtitle = document.getElementById('txSubtitle');
        subtitle.textContent = uncategorizedOnly
            ? `Inbox zero mode — ${data.total} uncategorized transaction(s)`
            : 'Click a category or merchant to edit it';

        const queue = document.getElementById('uncatQueue');
        const queueInfo = document.getElementById('uncatQueueInfo');
        queue.style.display = uncategorizedOnly ? 'flex' : 'none';
        if (uncategorizedOnly) {
            queueInfo.textContent = `${data.total} uncategorized on this page set`;
        }
    }

    function renderTable(txns) {
        const container = document.getElementById('tableBody');

        if (txns.length === 0) {
            container.innerHTML = `
            <div class="empty-state">
                <div class="icon">📋</div>
                <h3>No transactions found</h3>
                <p>Upload transactions to get started</p>
            </div>`;
            return;
        }

        let html = `<table>
        <thead><tr>
            <th style="width:40px">✓</th>
            <th>Date</th>
            <th>Merchant</th>
            <th>Category</th>
            <th style="text-align:right">Amount</th>
        </tr></thead><tbody>`;

        for (const t of txns) {
            const isExpense = t.amount < 0;
            const amountClass = isExpense ? 'expense' : 'income';
            const isUncategorized = t.category === 'Uncategorized';
            const badgeClass = isUncategorized ? 'badge badge-uncategorized' : 'badge';
            const dotColor = isUncategorized ? '' : `background:${getCategoryColor(t.category)}`;
            const checkbox = isUncategorized
                ? `<input type="checkbox" class="uncategorized-check" value="${t.id}" aria-label="Select transaction">`
                : '';
            const quickCategorySelect = isUncategorized
                ? `<div class="quick-category-wrap">
                    <select class="quick-category-select" onchange="applyQuickCategory('${t.id}', this)">
                        <option value="">Assign…</option>
                        ${categoryOptionsHtml()}
                    </select>
                </div>`
                : '';

            html += `<tr>
            <td>${checkbox}</td>
            <td>${t.date}</td>
            <td>
                <span class="editable" onclick="editField(this, '${t.id}', 'merchant')">${t.merchant}</span>
            </td>
            <td>
                <span class="${badgeClass}" onclick="editField(this, '${t.id}', 'category')">
                    <span class="badge-dot" style="${dotColor}"></span>
                    ${t.category}
                </span>
                ${quickCategorySelect}
            </td>
            <td class="amount ${amountClass}" style="text-align:right">${formatCurrency(t.amount)}</td>
        </tr>`;
        }

        html += '</tbody></table>';
        container.innerHTML = html;
        container.querySelectorAll('.uncategorized-check').forEach(check => {
            check.addEventListener('change', updateSelectAllButtonState);
        });
        updateSelectAllButtonState();
    }

    function renderPagination(page, total) {
        const container = document.getElementById('pagination');
        if (total <= 1) { container.innerHTML = ''; return; }

        let html = `<button ${page <= 1 ? 'disabled' : ''} onclick="loadTransactions(${page - 1})">← Prev</button>`;
        html += `<span class="pagination-info">Page ${page} of ${total}</span>`;
        html += `<button ${page >= total ? 'disabled' : ''} onclick="loadTransactions(${page + 1})">Next →</button>`;
        container.innerHTML = html;
    }

    function getCategoryColor(cat) {
        const colors = {
            'Digital Subscriptions': '#2EAADC', 'Food & Dining': '#D9730D',
            'Transport': '#448361', 'Shopping': '#9B51E0', 'Travel': '#337EA9',
            'Health': '#E16259', 'Health & Fitness': '#E16259',
            'Insurance': '#6940A5', 'Utilities': '#CC8E22',
            'Salary': '#0F7B6C', 'Pension': '#0F7B6C',
            'Entertainment': '#AD1A72', 'Education': '#6C6C6C',
            'Taxes': '#D44C47', 'Cash Deposit': '#0F7B6C',
            'Cash Withdrawal': '#E03E3E', 'Reimbursement': '#448361',
            'Transfer In': '#0F7B6C', 'Other Income': '#0F7B6C',
        };
        return colors[cat] || themeVar('--text-muted', '#787774');
    }

    function selectedUncategorizedIds() {
        return Array.from(document.querySelectorAll('.uncategorized-check:checked')).map(el => el.value);
    }

    function updateSelectAllButtonState() {
        const btn = document.getElementById('selectAllVisibleBtn');
        if (!btn) {
            return;
        }

        const allChecks = Array.from(document.querySelectorAll('.uncategorized-check'));
        const checked = allChecks.filter(el => el.checked).length;
        if (!allChecks.length) {
            btn.textContent = 'Select all visible';
            btn.disabled = true;
            return;
        }

        btn.disabled = false;
        btn.textContent = checked === allChecks.length ? 'Clear selection' : 'Select all visible';
    }

    function toggleSelectAllVisible() {
        const allChecks = Array.from(document.querySelectorAll('.uncategorized-check'));
        if (!allChecks.length) {
            return;
        }

        const shouldSelectAll = allChecks.some(el => !el.checked);
        allChecks.forEach(el => {
            el.checked = shouldSelectAll;
        });
        updateSelectAllButtonState();
    }

    async function applyBulkCategory() {
        const ids = selectedUncategorizedIds();
        const category = document.getElementById('bulkCategorySelect').value;
        if (!ids.length) {
            showToast('Select at least one uncategorized transaction', 'info');
            return;
        }
        if (!category) {
            showToast('Choose a category first', 'error');
            return;
        }

        const res = await fetch('/api/transactions/bulk-category', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ids, category }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
            showToast(data.error || 'Bulk update failed', 'error');
            return;
        }

        showToast(`Updated ${data.updated} transaction(s)`);
        loadTransactions(currentPage);
    }

    async function applyQuickCategory(txId, selectEl) {
        const category = selectEl.value;
        if (!category) {
            return;
        }

        const res = await fetch(`/api/transactions/${txId}`, {
            method: 'PATCH',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ category }),
        });
        const data = await res.json();
        if (!res.ok || !data.ok) {
            showToast(data.error || 'Category update failed', 'error');
            return;
        }

        showToast('Category updated');
        loadTransactions(currentPage);
    }

    function toggleUncategorizedQueue() {
        uncategorizedOnly = !uncategorizedOnly;
        document.getElementById('uncatToggleBtn').textContent = `Inbox zero: ${uncategorizedOnly ? 'ON' : 'OFF'}`;
        document.getElementById('categoryFilter').disabled = uncategorizedOnly;
        loadTransactions(1);
    }

    function editField(el, txId, field) {
        const current = el.textContent.trim();
        const input = document.createElement('input');
        input.className = 'edit-input';
        input.value = current;
        el.replaceWith(input);
        input.focus();
        input.select();

        async function save() {
            const newVal = input.value.trim();
            if (newVal && newVal !== current) {
                const body = {};
                body[field] = newVal;
                await fetch(`/api/transactions/${txId}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                showToast(`${field === 'category' ? 'Category' : 'Merchant'} updated`);
            }
            loadTransactions(currentPage);
        }

        input.addEventListener('blur', save);
        input.addEventListener('keydown', e => {
            if (e.key === 'Enter') save();
            if (e.key === 'Escape') loadTransactions(currentPage);
        });
    }

    // Debounced search
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', () => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => loadTransactions(1), 300);
    });
    document.getElementById('categoryFilter').addEventListener('change', () => loadTransactions(1));
    document.getElementById('dateFrom').addEventListener('change', () => loadTransactions(1));
    document.getElementById('dateTo').addEventListener('change', () => loadTransactions(1));

    window.addEventListener('spectra-theme-change', () => {
        loadTransactions(currentPage);
    });

    loadCategories();
    loadTransactions();
</script>
{% endblock %}
