<!DOCTYPE html>
<html lang="en" data-theme="{{ 'dark' if theme_preference == 'dark' else 'light' }}" data-theme-preference="{{ theme_preference|default('auto') }}">

<head>
    <meta charset="UTF-8">

        content="Spectra — Personal finance dashboard. Categorize, visualize, and track your spending.">
    <title>{% block title %}Spectra{% endblock %}</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>">
    <script>
        const SERVER_THEME_PREFERENCE = {{ theme_preference|default('auto')|tojson }};
        const THEME_STORAGE_KEY = 'spectra-theme-preference';
        const THEME_OPTIONS = ['auto', 'light', 'dark'];

        function safeReadStoredThemePreference() {
            try {
                const value = localStorage.getItem(THEME_STORAGE_KEY);
                return THEME_OPTIONS.includes(value) ? value : null;
            } catch (_err) {
                return null;
            }
        }

        function safeStoreThemePreference(preference) {
            try {
                localStorage.setItem(THEME_STORAGE_KEY, preference);
            } catch (_err) {
                // Ignore storage failures (private mode, disabled storage, etc.)
            }
        }

        function getThemePreference() {
            if (window.__spectraTheme?.preference && THEME_OPTIONS.includes(window.__spectraTheme.preference)) {
                return window.__spectraTheme.preference;
            }

            const stored = safeReadStoredThemePreference();
            if (stored) {
                return stored;
            }

            return THEME_OPTIONS.includes(SERVER_THEME_PREFERENCE) ? SERVER_THEME_PREFERENCE : 'auto';
        }

        function getSystemTheme() {
            return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }

        function resolveTheme(preference = getThemePreference()) {
            return preference === 'auto' ? getSystemTheme() : preference;
        }

        function applyTheme(preference = getThemePreference()) {
            const effectiveTheme = resolveTheme(preference);
            document.documentElement.dataset.theme = effectiveTheme;
            document.documentElement.dataset.themePreference = preference;
            window.__spectraTheme = { preference, effectiveTheme };
            return window.__spectraTheme;
        }

        applyTheme(getThemePreference());
    </script>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        let defaultCurrency = null; // initially §null§ and will be populated when needed using `loadCurrency`
        // Promise<string|undefined>
        async function loadCurrency() {
            if (!defaultCurrency) {
                const response = await fetch('/api/settings');
                defaultCurrency = await response.json()['currency'];
            }
            return defaultCurrency;
        }

        const themeMediaQuery = window.matchMedia('(prefers-color-scheme: dark)');

        function emitThemeChange(detail) {
            window.dispatchEvent(new CustomEvent('spectra-theme-change', { detail }));
        }

        function syncThemeSelects() {
            const preference = getThemePreference();
            document.querySelectorAll('[data-theme-select]').forEach(select => {
                if (select.value !== preference) {
                    select.value = preference;
                }
            });
        }

        function setThemePreference(preference) {
            const normalized = THEME_OPTIONS.includes(preference) ? preference : 'auto';
            const detail = applyTheme(normalized);
            safeStoreThemePreference(normalized);
            syncThemeSelects();
            emitThemeChange(detail);
            return detail;
        }

        const handleSystemThemeChange = () => {
            if (getThemePreference() !== 'auto') {
                return;
            }

            const detail = applyTheme('auto');
            syncThemeSelects();
            emitThemeChange(detail);
        };

        if (typeof themeMediaQuery.addEventListener === 'function') {
            themeMediaQuery.addEventListener('change', handleSystemThemeChange);
        } else if (typeof themeMediaQuery.addListener === 'function') {
            themeMediaQuery.addListener(handleSystemThemeChange);
        }

        window.SpectraTheme = {
            getPreference: getThemePreference,
            getEffectiveTheme: () => resolveTheme(getThemePreference()),
            getState: () => window.__spectraTheme || applyTheme(getThemePreference()),
            setPreference: setThemePreference,
            getCssVar: (name, fallback = '') => getComputedStyle(document.documentElement).getPropertyValue(name).trim() || fallback,
            syncThemeSelects,
        };

        syncThemeSelects();

        function parseSpectraDate(dateString) {
            return new Date(`${dateString}T00:00:00`);
        }

        function formatSpectraDate(dateString, options = { day: 'numeric', month: 'short', year: 'numeric' }) {
            return parseSpectraDate(dateString).toLocaleDateString('en', options);
        }

        function formatCycleRange(startDate, endExclusiveDate, options = { day: 'numeric', month: 'short', year: 'numeric' }) {
            const endDate = parseSpectraDate(endExclusiveDate);
            endDate.setDate(endDate.getDate() - 1);
            return `${parseSpectraDate(startDate).toLocaleDateString('en', options)} -> ${endDate.toLocaleDateString('en', options)}`;
        }

        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const icons = { success: '✓', error: '✗', info: 'ℹ' };
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${icons[type] || ''}</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(24px)';
                toast.style.transition = '0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function formatCurrency(amount, currency = undefined) {
            const options = { style: 'currency', currency: currency || defaultCurrency };
            return new Intl.NumberFormat(navigator.language || 'it-IT', options).format(amount);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Close sidebar on outside click (mobile)
        document.addEventListener('click', e => {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('menuToggle');
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')
                && !sidebar.contains(e.target) && !toggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
