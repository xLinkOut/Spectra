<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Spectra — Personal finance dashboard. Categorize, visualize, and track your spending.">
    <title>{% block title %}Spectra{% endblock %}</title>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌟</text></svg>">
    <link rel="stylesheet" href="/static/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>

<body>
    <button class="menu-toggle" id="menuToggle" onclick="toggleSidebar()">☰</button>

    <aside class="sidebar" id="sidebar">
        <div class="sidebar-brand">
            <span class="icon">🌟</span>
            Spectra
        </div>
        <nav>
            <ul class="sidebar-nav">
                <li><a href="/" class="{% if request.url.path == '/' %}active{% endif %}">
                        <span class="nav-icon">📊</span> Dashboard
                    </a></li>
                <li><a href="/transactions" class="{% if request.url.path == '/transactions' %}active{% endif %}">
                        <span class="nav-icon">📋</span> Transactions
                    </a></li>
                <li><a href="/budget" class="{% if request.url.path == '/budget' %}active{% endif %}">
                        <span class="nav-icon">💰</span> Budget
                    </a></li>
                <li><a href="/trends" class="{% if request.url.path == '/trends' %}active{% endif %}">
                        <span class="nav-icon">📈</span> Trends
                    </a></li>
                <li><a href="/upload" class="{% if request.url.path == '/upload' %}active{% endif %}">
                        <span class="nav-icon">📤</span> Upload
                    </a></li>
                <li><a href="/settings" class="{% if request.url.path == '/settings' %}active{% endif %}">
                        <span class="nav-icon">⚙️</span> Settings
                    </a></li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            Self-hosted · Data stays on your machine
        </div>
    </aside>

    <main class="main">
        {% block content %}{% endblock %}
    </main>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            const icons = { success: '✓', error: '✗', info: 'ℹ' };
            toast.className = `toast toast-${type}`;
            toast.innerHTML = `<span>${icons[type] || ''}</span> ${message}`;
            container.appendChild(toast);
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(24px)';
                toast.style.transition = '0.3s ease';
                setTimeout(() => toast.remove(), 300);
            }, 4000);
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('it-IT', { style: 'currency', currency: 'EUR' }).format(amount);
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        // Close sidebar on outside click (mobile)
        document.addEventListener('click', e => {
            const sidebar = document.getElementById('sidebar');
            const toggle = document.getElementById('menuToggle');
            if (window.innerWidth <= 768 && sidebar.classList.contains('open')
                && !sidebar.contains(e.target) && !toggle.contains(e.target)) {
                sidebar.classList.remove('open');
            }
        });
    </script>

    {% block scripts %}{% endblock %}
</body>

</html>
